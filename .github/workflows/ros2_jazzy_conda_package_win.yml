name: Create ROS2 Jazzy package on Windows

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: 3.12
          auto-activate-base: false
          activate-environment: build-env
          environment-file: environment.yml  # Optional: use your actual env file if needed
          miniforge-variant: Mambaforge
          miniforge-version: latest

      - name: Build Conda Package
        uses: cascode-labs/build-conda-action/action.yml@v0
        with:
          recipe_path: ./conda  # Update this path to your actual recipe location
          base_env_prefix: C:\Miniconda\envs\build-env  # Update if different
          package_artifact_name: ros2-audio-tools-package
          test_results_artifact_name: ros2-audio-tools-test-results
          build_options: "-c https://prefix.dev/robostack-jazzy -c conda-forge"
          conda_build_env_filepath: conda/conda_build_config.yaml  # Adjust if needed