name: Create ROS2 Jazzy package on Linux

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.5.1
      - name: Run colcon build (Release Mode)
        run: |
          mkdir -p /tmp/build_src
          cp -r . /tmp/build_src/ROS2_Audio_Tools
          # Run conda build from within the temp copy
          cd /tmp/build_src/ROS2_Audio_Tools/conda
          pixi run conda install conda-build conda-verify
          pixi run "cd conda && conda build . -c https://prefix.dev/robostack-jazzy -c conda-forge"
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release upload $(gh release view --repo CLFML/ROS2_Audio_Tools --json tagName --jq ".tagName") ~/miniforge3/conda-bld/linux-64/*.conda