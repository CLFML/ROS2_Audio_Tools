{% set name = "audio_tools" %}
{% set version = environ.get("RELEASE_VERSION") or "0.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: {{ environ.get("SRC_PATH") }}

build:
  number: 1

requirements:
  build:
    - ros-jazzy-desktop
    - sdl2 >=2.26,<3.0  # instead of just sdl2
    - libgcc-ng
    - libstdcxx-ng
    - libcxx  # macOS compatibility (optional)
    - libffi

  run:
    - ros-jazzy-desktop
    - sdl2 >=2.26,<3.0  # instead of just sdl2
    - libgcc-ng
    - libstdcxx-ng
    - libcxx  # macOS compatibility (optional)
    - libffi
    - openssl  # if needed by deps

about:
  summary: "ROS 2 audio capture/processing tools"
  license: "Apache-2.0"
  home: "https://github.com/CLFML/ROS2_Audio_Tools"
